services:
  influxdb:
    image: influxdb:2.7
    container_name: g12-influxdb
    ports:
      - "8086:8086"
    volumes:
      - ./influxdb-data:/var/lib/influxdb2
      - ./influxdb-config:/etc/influxdb2
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: Admin@12345
      DOCKER_INFLUXDB_INIT_ORG: grupo12
      DOCKER_INFLUXDB_INIT_BUCKET: monitoramento
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: g12-super-token-influxdb-2026